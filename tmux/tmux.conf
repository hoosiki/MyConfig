# =============================================================================
#  tmux 3.6+ Configuration — hoosiki
# =============================================================================

# ---------------------------------------------------------------------------
#  Prefix Key: Ctrl-k (unbind default Ctrl-b)
# ---------------------------------------------------------------------------
set -g prefix C-k
unbind C-b
unbind C-a
bind C-k send-prefix

# ---------------------------------------------------------------------------
#  General Settings
# ---------------------------------------------------------------------------

# 256-color + xterm key passthrough
set -g default-terminal "xterm-256color"
set-window-option -g xterm-keys on

# Allow passthrough sequences (e.g. for image protocols, OSC 52 clipboard)
set -g allow-passthrough on

# Allow tmux to set the system clipboard via OSC 52
set -g set-clipboard on

# Default shell
set-option -g default-command "zsh"

# Scrollback buffer: 50,000 lines
set -g history-limit 50000

# Paste buffer limit
set-option -g buffer-limit 32

# Window/pane numbering starts at 1
set-option -g base-index 1
setw -g pane-base-index 1

# Auto-rename windows based on running command
set-window-option -g automatic-rename on

# Vi mode for copy-mode
setw -g mode-keys vi

# Mouse support (scroll, select pane/window, resize)
set-option -g mouse on

# ---------------------------------------------------------------------------
#  Key Bindings — Window & Pane
# ---------------------------------------------------------------------------

# Reload config: prefix + r
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Split panes: | or \ for horizontal, - for vertical
bind \| split-window -h
bind \\ split-window -h
bind \- split-window -v

# Move current window to position 1: prefix + T
bind T swap-window -t 1

# Vi-style pane navigation: h/j/k/l
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Toggle last pane: prefix + w
bind w select-pane -l

# Alt+W: toggle last pane (no prefix needed)
bind-key -n M-W last-pane

# Cycle windows: Ctrl-h / Ctrl-l
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# Resize panes: H/J/K/L (repeatable, 5 cells at a time)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Alt+number: switch to window N directly (no prefix)
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9

# Alt+q: display pane numbers
bind-key -n M-q display-panes

# ---------------------------------------------------------------------------
#  Copy & Paste (Vi-style)
# ---------------------------------------------------------------------------

# 'v' to begin selection, 'y' to yank (copy-selection sends OSC 52 via set-clipboard)
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel

# ---------------------------------------------------------------------------
#  F12 Toggle — Disable prefix for nested tmux sessions
#  Press F12 to disable outer tmux keys (pass through to inner),
#  press F12 again to re-enable.
# ---------------------------------------------------------------------------
bind -T root F12 \
  set prefix None \;\
  set key-table off \;\
  set status-style "fg=colour244,bg=colour238" \;\
  set window-status-current-style "fg=colour232,bold,bg=colour172" \;\
  if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
  refresh-client -S \;

bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-style \;\
  set -u window-status-current-style \;\
  refresh-client -S

# ---------------------------------------------------------------------------
#  Status Bar
# ---------------------------------------------------------------------------

# Enable status bar, update every 5 seconds, center window list
set-option -g status on
set -g status-interval 5
set -g status-justify centre
set-option -g status-position top

# Monitor activity in other windows
setw -g monitor-activity on
set -g visual-activity on

# --- Solarized 256 color theme ---

# Status bar: dark background, yellow text
set-option -g status-style "bg=colour235,fg=colour136"

# Left: time, date, session name, window:pane index
set -g status-left-length 60
set -g status-left "#[fg=green]::%l:%M %p#[fg=yellow]::%Y-%m-%d::#[fg=blue]#S #[fg=colour255]Tab#[fg=yellow]#I#[fg=colour255]:Pane#[fg=yellow]#P"

# Right: hostname
set -g status-right-length 70
set -g status-right "#[fg=green]#h"

# Pane number overlay colors
set-option -g display-panes-active-colour colour33   # blue
set-option -g display-panes-colour colour166          # orange

# Clock color (prefix + t)
set-window-option -g clock-mode-colour colour64       # green

# ---------------------------------------------------------------------------
#  Active Pane Visibility
# ---------------------------------------------------------------------------

# Border: inactive dim, active bright blue
set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=colour39'

# Heavy border lines + directional arrows
set -g pane-border-lines heavy
set -g pane-border-indicators both

# Focus events: allow Neovim to detect focus changes
set -g focus-events on

# Default window style (both active and inactive start as default)
set -g window-style 'fg=default,bg=default'
set -g window-active-style 'fg=default,bg=default'

# On focus-in: restore default style
set-hook -g pane-focus-in 'select-pane -P bg=default,fg=default'

# On focus-out: dim the inactive pane
set-hook -g pane-focus-out 'select-pane -P bg=colour238'

# ---------------------------------------------------------------------------
#  Plugins (TPM)
# ---------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

# Initialize TPM (keep at very bottom)
# run '~/.tmux/plugins/tpm/tpm'
