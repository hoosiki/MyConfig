# =============================================================================
#  tmuxp Session Config — ClaudeResearches
#  Usage: tmuxp load tmux_init.yaml
# =============================================================================

session_name: claude-research
start_directory: /Users/hoosiki
suppress_history: true

# tmux options (session-level)
options:
  default-command: zsh

windows:
  # ── Window 1: research ─────────────────────────────────────────────────
  - window_name: auto_agent
    start_directory: /Users/hoosiki/PycharmProjects/auto_agent
    layout: even-horizontal
    panes:
      # Pane 1 (left): Claude Code CLI
      - shell_command:
          - claude --dangerously-skip-permissions
        focus: true
      # Pane 2 (right): nvim — 가장 최근 편집 파일 자동 열기
      - shell_command:
          - nvim -c "'0"
  # ── Window 2: plugin ───────────────────────────────────────────────────
  - window_name: viewer
    start_directory: /Users/hoosiki/PycharmProjects/obsidian_viewer
    layout: even-horizontal
    panes:
      # Pane 1 (left): Claude Code CLI
      - shell_command:
          - claude --dangerously-skip-permissions
      # Pane 2 (right): nvim — 가장 최근 편집 파일 자동 열기
      - shell_command:
          - nvim -c "'0"
