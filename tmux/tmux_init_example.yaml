# =============================================================================
#  tmuxp Session Config — Claude Code + Neovim 개발 환경
#  Usage: tmuxp load tmux_init.yaml
#
#  NOTE: 아래 경로들은 예시입니다. 자신의 환경에 맞게 수정하세요.
# =============================================================================

session_name: claude-research
start_directory: ~/
suppress_history: true

# tmux options (session-level)
options:
  default-command: zsh

windows:
  # ── Window 1: research ─────────────────────────────────────────────────
  - window_name: research
    start_directory: ~/Projects/research
    layout: even-horizontal
    panes:
      # Pane 1 (left): Claude Code CLI
      - shell_command:
          - claude
        focus: true
      # Pane 2 (right): nvim — 가장 최근 편집 파일 자동 열기
      - shell_command:
          - nvim -c "'0"
  # ── Window 2: project-a ────────────────────────────────────────────────
  - window_name: project-a
    start_directory: ~/Projects/project-a
    layout: even-horizontal
    panes:
      # Pane 1 (left): Claude Code CLI
      - shell_command:
          - claude
      # Pane 2 (right): nvim — 가장 최근 편집 파일 자동 열기
      - shell_command:
          - nvim -c "'0"
  # ── Window 3: project-b ────────────────────────────────────────────────
  - window_name: project-b
    start_directory: ~/Projects/project-b
    layout: even-horizontal
    panes:
      # Pane 1 (left): Claude Code CLI
      - shell_command:
          - claude
      # Pane 2 (right): nvim — 가장 최근 편집 파일 자동 열기
      - shell_command:
          - nvim -c "'0"
